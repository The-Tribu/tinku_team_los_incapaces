          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/setDevBatteryParam:
    post:
      tags: [Huawei · Control]
      summary: Set Battery Parameters (SOC mínimo, modo de descarga, etc.)
      operationId: huaweiBatteryParamSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds]
              properties:
                devIds:           { type: string }
                chargeDischargeMode: { type: string }
                socMin:           { type: number }
                socMax:           { type: number }
      responses:
        "200":
          description: Comando asíncrono encolado.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/getDevActivePowerCtrlMode:
    post:
      tags: [Huawei · Control]
      summary: Query Inverter Active Power Control Mode
      operationId: huaweiInverterActivePowerQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds]
              properties:
                devIds: { type: string }
      responses:
        "200":
          description: Modo de control de potencia activa.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/setDevActivePowerCtrlMode:
    post:
      tags: [Huawei · Control]
      summary: Set Inverter Active Power Control Mode
      operationId: huaweiInverterActivePowerSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds, ctrlMode]
              properties:
                devIds:   { type: string }
                ctrlMode: { type: string, description: "Código del modo (ver doc Huawei)." }
                value:    { type: number, description: "Setpoint (%) cuando aplica." }
      responses:
        "200":
          description: Comando asíncrono encolado.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/sendDispatchTask:
    post:
      tags: [Huawei · Control]
      summary: Enviar tarea de dispatch (carga/descarga programada)
      description: |
        Programa una tarea de carga o descarga de batería con ventana horaria
        y potencia objetivo. La respuesta incluye el `taskId` para consultar
        estado.
      operationId: huaweiSendDispatchTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds, taskType, startTime, endTime]
              properties:
                devIds:    { type: string }
                taskType:  { type: string, description: "`charge` | `discharge`." }
                startTime: { type: integer, description: "ms unix epoch" }
                endTime:   { type: integer, description: "ms unix epoch" }
                power:     { type: number, description: "Potencia objetivo (W)." }
      responses:
        "200":
          description: Tarea aceptada.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/getDispatchTaskResult:
    post:
      tags: [Huawei · Control]
      summary: Consultar estado de una tarea de dispatch
      operationId: huaweiGetDispatchTaskResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [taskId]
              properties:
                taskId: { type: string }
      responses:
        "200":
          description: Estado de la tarea.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    teamApiKey:
      type: apiKey
      in: header
      name: Authorization
      description: |
        API key del equipo (formato `tk_xxxxxxxx`). Se entrega **una por
        equipo** mediante QR dentro del kit de bienvenida. El middleware
        **no usa** el prefijo `Bearer`; envía el token pelado.

  parameters:
    GrowattPage:
      name: page
      in: query
      required: false
      schema: { type: integer, minimum: 1, default: 1 }

  responses:
    Unauthorized:
      description: Falta el header `Authorization` o la API key es inválida.
      content:
        text/plain:
          schema: { type: string }
          example: "Unauthorized"
    ProviderNotFound:
      description: El slug del proveedor no existe. Revisa la sección **Slugs de proveedor**.
      content:
        text/plain:
          schema: { type: string }
          example: "Not Found"
    MethodNotAllowed:
      description: |
        Método HTTP no permitido. El middleware solo permite:
        - `GET` para todos los proveedores.
        - `POST` adicional para `/deye/*` y `/huawei/*`.
      content:
        text/plain:
          schema: { type: string }
          example: "Method Not Allowed"
    GrowattOk:
      description: Respuesta Growatt con el envelope estándar `{error_code, error_msg, data}`.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/GrowattEnvelope" }

  schemas:
    # ── Growatt ──
    GrowattEnvelope:
      type: object
      description: Envelope estándar de Growatt (`error_code`, `error_msg`, `data`).
      required: [error_code, error_msg]
      properties:
        error_code:
          type: integer
          description: 0 = éxito. Cualquier otro valor es un error lógico del proveedor.
          example: 0
        error_msg:
          type: string
          example: ""
        data:
          description: Payload específico del endpoint (puede ser objeto, array o string vacío cuando hay error).
          nullable: true

    GrowattPlantDataResponse:
      allOf:
        - $ref: "#/components/schemas/GrowattEnvelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/GrowattPlantData" }

    GrowattPlantData:
      type: object
      description: |
        Shape capturado en vivo por `scripts/explore-middleware.ts`. Los
        campos numéricos a veces llegan como `number` y a veces como `string`;
        hay que normalizar en cliente.
      properties:
        current_power:       { description: "Potencia AC instantánea (kW).", oneOf: [{ type: number }, { type: string }], example: 0 }
        today_energy:        { description: "Energía producida hoy (kWh).",   oneOf: [{ type: number }, { type: string }], example: "0" }
        monthly_energy:      { oneOf: [{ type: number }, { type: string }], example: "0" }
        yearly_energy:       { oneOf: [{ type: number }, { type: string }], example: "0" }
        total_energy:        { oneOf: [{ type: number }, { type: string }], example: "93890" }
        peak_power_actual:   { description: "Potencia pico histórica (kW).",  oneOf: [{ type: number }, { type: string }], example: 50 }
        last_update_time:    { description: "Timestamp en timezone de la planta (`YYYY-MM-DD HH:mm:ss`).", type: string, example: "2025-04-11 11:03:27" }
        carbon_offset:       { oneOf: [{ type: number }, { type: string }], example: "0" }
        timezone:            { type: string, example: "GMT-5" }
        efficiency:          { oneOf: [{ type: number }, { type: string }], example: "" }

    GrowattPlantListItem:
      type: object
      description: Elemento del array `data.plants[]` cuando el listado llega decodificado.
      properties:
        plant_id:    { type: integer }
        plant_name:  { type: string }
        country:     { type: string }
        city:        { type: string }
        latitude_f:  { type: number, nullable: true }
        longitude_f: { type: number, nullable: true }
        total_energy: { type: string }

    # ── DeyeCloud ──
    DeyePageRequest:
      type: object
      required: [page, size]
      properties:
        page: { type: integer, minimum: 1, example: 1 }
        size: { type: integer, minimum: 1, maximum: 100, example: 20 }

    DeyeError:
      type: object
      properties:
        code:      { type: string, example: "2101008" }
        msg:       { type: string, example: "invalid param type" }
        success:   { type: boolean, example: false }
        requestId: { type: string, example: "af042e17246ef5a2" }

    DeyeStation:
      type: object
      properties:
        id:                { oneOf: [{ type: integer }, { type: string }] }
        name:              { type: string }
        locationLat:       { type: number }
        locationLng:       { type: number }
        locationAddress:   { type: string }
        installedCapacity: { type: number, description: "Capacidad instalada en kW." }
        connectionStatus:
          type: string
          enum: [NORMAL, PARTIAL_OFFLINE, ALL_OFFLINE]
        generationPower:   { type: number, description: "Potencia generada en W." }
        lastUpdateTime:    { type: integer, description: "Unix epoch (segundos)." }

    DeyeStationLatestResp:
      type: object
      properties:
        success:             { type: boolean }
        generationPower:     { type: number, description: "Potencia generada (W)." }
        consumptionPower:    { type: number }
        batteryPower:        { type: number }
        batterySOC:          { type: number, nullable: true }
        irradiateIntensity:  { type: number, nullable: true }
        lastUpdateTime:      { type: integer, description: "Unix epoch (segundos)." }

    # ── Huawei FusionSolar ──
    HuaweiEnvelope:
      type: object
      description: |
        Envelope estándar de Huawei FusionSolar. `success=true` y
        `failCode=0` indican éxito; cualquier otro `failCode` documenta el
        error en `message` (ver doc oficial por tabla de códigos).
      required: [success, failCode]
      properties:
        success:  { type: boolean, example: true }
        failCode: { type: integer, example: 0 }
        message:  { type: string, nullable: true }
        params:   { type: object, additionalProperties: true, nullable: true }
        data:
          description: Payload específico del endpoint (objeto o array).
          nullable: true

    HuaweiStationRealKpi:
      type: object
      properties:
        day_power:          { type: number, description: "Energía del día (kWh)." }
        month_power:        { type: number, description: "Energía del mes (kWh)." }
        total_power:        { type: number, description: "Energía total histórica (kWh)." }
        day_income:         { type: number, description: "Ingresos del día." }
        total_income:       { type: number, description: "Ingresos totales." }
        day_on_grid_energy: { type: number, description: "Energía entregada a la red en el día (kWh)." }
        day_use_energy:     { type: number, description: "Energía auto-consumida en el día (kWh)." }
        real_health_state:
          type: integer
          description: "1 = disconnected · 2 = faulty · 3 = healthy"
          enum: [1, 2, 3]

    HuaweiDevice:
      type: object
      properties:
        id:          { type: integer, description: "Device ID interno de FusionSolar." }
        devName:     { type: string }
        stationCode: { type: string }
        esnCode:     { type: string, description: "Serial del equipo." }
        devTypeId:   { $ref: "#/components/schemas/HuaweiDevTypeId" }
        softwareVersion: { type: string }
        invType:     { type: string, nullable: true }
        longitude:   { type: number, nullable: true }
        latitude:    { type: number, nullable: true }

    HuaweiDevTypeId:
      type: integer
      description: |
        Tipo de dispositivo según Huawei FusionSolar. Subset más usado:

        | ID   | Descripción                     |
        |------|---------------------------------|
        | 1    | String inverter                 |
        | 2    | SUN2000 string inverter         |
        | 8    | Environmental Monitoring Unit   |
        | 10   | Power meter                     |
        | 13   | SmartLogger                     |
        | 16   | Transformer                     |
        | 17   | Battery                         |
        | 22   | SmartLogger3000                 |
        | 37   | Grid meter                      |
        | 38   | PID                             |
        | 39   | ESS (Energy Storage System)     |
        | 40   | SmartACU                        |
        | 41   | Optimizer                       |
        | 45   | String Inverter v2              |
        | 46   | Smart Power Sensor              |
        | 47   | SmartAssistant                  |
        | 62   | Combiner box                    |
        | 63   | Weather station                 |
        | 70   | Dongle                          |
        | 60001| Residential inverter            |
        | 60003| Hybrid inverter                 |
        | 23070| Smart Meter v3                  |
      enum: [1, 2, 8, 10, 13, 16, 17, 22, 37, 38, 39, 40, 41, 45, 46, 47, 62, 63, 70, 60001, 60003, 23070]

    HuaweiKpiTimeRequest:
      type: object
      required: [stationCodes, collectTime]
      properties:
        stationCodes: { type: string, description: "Hasta 100 separados por coma." }
        collectTime:
          type: integer
          description: |
            Marca de tiempo (ms unix epoch) del bucket consultado. Huawei
            redondea al inicio del intervalo (hora / día / mes / año).
          example: 1776412800000

    HuaweiDevKpiTimeRequest:
      type: object
      required: [devIds, devTypeId, collectTime]
      properties:
        devIds:      { type: string, description: "IDs separados por coma." }
        devTypeId:   { $ref: "#/components/schemas/HuaweiDevTypeId" }
        collectTime: { type: integer, description: "ms unix epoch del bucket." }
