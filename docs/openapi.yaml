  # ═══════════════════════════════════════════════════════════
  # Huawei FusionSolar · Alarm
  # ═══════════════════════════════════════════════════════════
  /huawei/thirdData/getAlarmList:
    post:
      tags: [Huawei · Alarm]
      summary: Active Alarms API
      description: |
        Lista de alarmas activas. El parámetro `language` soporta los locales
        `en_US` (default), `zh_CN`, `ja_JP`, `nl_NL`, `de_DE`, `fr_FR`, `it_IT`,
        `pl_PL`, `pt_PT`, `es_ES`, `hu_HU`, `vi_VN`, `tr_TR`, `uk_UA`, `zh_TW`
        y `ko_KR`.
      operationId: huaweiAlarmList
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stationCodes, beginTime, endTime]
              properties:
                stationCodes: { type: string, description: "Máx 100 separados por coma." }
                beginTime:    { type: integer, description: "ms unix epoch" }
                endTime:      { type: integer, description: "ms unix epoch" }
                language:
                  type: string
                  default: en_US
                  enum: [en_US, zh_CN, ja_JP, nl_NL, de_DE, fr_FR, it_IT, pl_PL, pt_PT, es_ES, hu_HU, vi_VN, tr_TR, uk_UA, zh_TW, ko_KR]
      responses:
        "200":
          description: Listado de alarmas activas.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ═══════════════════════════════════════════════════════════
  # Huawei FusionSolar · Control (configuración + tareas asíncronas)
  # ═══════════════════════════════════════════════════════════
  /huawei/thirdData/getDevBatteryWorkMode:
    post:
      tags: [Huawei · Control]
      summary: Query Battery Working Mode
      operationId: huaweiBatteryWorkModeQuery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds]
              properties:
                devIds: { type: string, description: "IDs separados por coma." }
      responses:
        "200":
          description: Modo actual de trabajo de la batería.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HuaweiEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /huawei/thirdData/setDevBatteryWorkMode:
    post:
      tags: [Huawei · Control]
      summary: Set Battery Working Mode
      operationId: huaweiBatteryWorkModeSet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [devIds, mode]
